---
# Runs the pyATS eAPI checks against the just-synced lab as an ArgoCD PostSync
# hook. If the tests fail the hook fails, the ArgoCD app goes Degraded, and (via
# argocd-notifications) a failed commit status is posted back to the PR.
apiVersion: batch/v1
kind: Job
metadata:
  name: pyats-tests
  annotations:
    argocd.argoproj.io/hook: PostSync
    # Keep the (possibly failed) pod for log inspection; clear it on next sync.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: pyats
          # kind-loaded local image (kind load docker-image pyats-clab:latest).
          image: pyats-clab:latest
          imagePullPolicy: IfNotPresent
          env:
            # cEOS needs a few minutes to boot; poll eAPI until it answers.
            - name: PYATS_BOOT_TIMEOUT
              value: "600"
