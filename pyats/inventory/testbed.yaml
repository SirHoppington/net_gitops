---
# pyATS testbed targeting the per-PR clabernetes lab deployed by ArgoCD.
#
# The pyATS Job runs IN-CLUSTER (ArgoCD PostSync hook) in namespace
# lab-pr-<PR-number>, alongside clabernetes Topology "ci" (nodes r1-clab1 /
# r2-clab1, Arista cEOS). It reaches each node's mgmt directly via the
# clabernetes Service "ci-<node>" (naming: prefixed) — no port-forward.
testbed:
  name: argo_clab_pr_lab

devices:
  r1-clab1:
    type: router
    os: eos
    credentials:
      default:
        username: admin
        password: admin
    connections:
      cli:
        protocol: ssh
        ip: ci-r1-clab1
        port: 22
      eapi:
        protocol: https
        ip: ci-r1-clab1
        port: 443
  r2-clab1:
    type: router
    os: eos
    credentials:
      default:
        username: admin
        password: admin
    connections:
      cli:
        protocol: ssh
        ip: ci-r2-clab1
        port: 22
      eapi:
        protocol: https
        ip: ci-r2-clab1
        port: 443
