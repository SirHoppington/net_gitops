---
name: pyats-lab

# Surfaces the in-cluster pyATS result (ArgoCD PostSync hook Job "pyats-tests"
# in namespace lab-pr-<PR>) into GitHub Actions: waits for the ArgoCD app to
# sync, then tails the Job logs and mirrors its pass/fail as the check result.
#
# Runs on a SELF-HOSTED runner (GitHub-hosted runners cannot reach the private
# lab cluster). Needs a base64 kubeconfig in secret KUBECONFIG_B64.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pyats:
    runs-on: self-hosted
    env:
      NS: lab-pr-${{ github.event.pull_request.number }}
      APP: lab-pr-${{ github.event.pull_request.number }}
      KUBECONFIG: ${{ github.workspace }}/.kube/config
      KIND_CLUSTER: c9s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build + load pyATS image into kind
        run: |
          # Rebuild from this PR's code and load into the cluster so the Job
          # never runs a stale image. sudo: docker/kind use the host socket.
          sudo docker build -f pyats/Dockerfile-pyats -t pyats-clab:latest .
          sudo kind load docker-image pyats-clab:latest -n "$KIND_CLUSTER"

      - name: Configure kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"

      - name: Preflight - cluster reachable + app exists
        run: |
          echo "context: $(kubectl config current-context 2>&1)"
          if ! kubectl -n argocd get applications 2>&1; then
            echo "::error::kubectl cannot list ArgoCD applications - check KUBECONFIG_B64 / RBAC / reachability"
            exit 1
          fi
          if ! kubectl -n argocd get application "$APP" >/dev/null 2>&1; then
            echo "::error::ArgoCD app $APP not found - is the pr-labs ApplicationSet generating it?"
            kubectl -n argocd get applicationset pr-labs -o yaml 2>&1 | tail -40
            exit 1
          fi

      - name: Wait for ArgoCD app to sync
        run: |
          for i in $(seq 1 60); do
            sync=$(kubectl -n argocd get application "$APP" \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || true)
            health=$(kubectl -n argocd get application "$APP" \
              -o jsonpath='{.status.health.status}' 2>/dev/null || true)
            echo "[$i] $APP sync=${sync:-?} health=${health:-?}"
            [ "$sync" = "Synced" ] && exit 0
            sleep 20
          done
          echo "::error::ArgoCD app $APP not Synced in time"
          kubectl -n argocd get application "$APP" -o yaml 2>&1 | tail -40
          exit 1

      - name: Run pyATS Job in-cluster
        run: |
          # Run the test on demand (don't rely on the ArgoCD PostSync hook, which
          # only fires during a sync). Fresh Job each run; reaches routers by svc DNS.
          kubectl -n "$NS" delete job pyats-tests --ignore-not-found
          kubectl -n "$NS" apply -f ci/pyats-job.yaml

      - name: Wait for pyATS Job to finish
        id: job
        run: |
          # run_test polls eAPI while cEOS boots (~10min).
          for i in $(seq 1 90); do
            succeeded=$(kubectl -n "$NS" get job pyats-tests \
              -o jsonpath='{.status.succeeded}' 2>/dev/null || true)
            failed=$(kubectl -n "$NS" get job pyats-tests \
              -o jsonpath='{.status.failed}' 2>/dev/null || true)
            echo "[$i] pyats-tests succeeded=${succeeded:-0} failed=${failed:-0}"
            if [ "${succeeded:-0}" = "1" ]; then
              echo "result=pass" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ -n "$failed" ] && [ "$failed" != "0" ]; then
              echo "result=fail" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 10
          done
          echo "result=timeout" >> "$GITHUB_OUTPUT"

      - name: Show pyATS logs
        if: always()
        run: kubectl -n "$NS" logs job/pyats-tests || true

      - name: Reflect result
        if: always()
        run: |
          case "${{ steps.job.outputs.result }}" in
            pass) echo "pyATS passed"; exit 0 ;;
            fail) echo "pyATS failed" >&2; exit 1 ;;
            *)    echo "pyATS did not complete in time" >&2; exit 1 ;;
          esac
