---
# On-demand pyATS Job applied by the pyats-lab workflow (NOT an ArgoCD hook).
# Runs in-cluster so it reaches the routers via clabernetes svc DNS.
apiVersion: batch/v1
kind: Job
metadata:
  name: pyats-tests
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: pyats
          # kind-loaded local image (kind load docker-image pyats-clab:latest).
          # IfNotPresent so it uses the loaded image instead of pulling a registry.
          image: pyats-clab:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PYATS_BOOT_TIMEOUT
              value: "600"
